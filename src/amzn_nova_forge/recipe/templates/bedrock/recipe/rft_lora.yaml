# Bedrock RFT LoRA Recipe Template for Amazon Nova Models
# This template defines the default configuration for Reinforcement Fine-Tuning with LoRA

run:
  name: bedrock-rft-lora
  model_type: amazon.nova-micro-v1:0:128k
  model_name_or_path: nova-micro/prod

training_config:
  method: rft_lora
  
  # RFT Configuration (passed to Bedrock API customizationConfig.rftConfig)
  rft:
    # Grader Configuration - Lambda function that evaluates responses and provides reward signals
    graderConfig:
      lambdaGrader:
        lambdaArn: "{{reward_lambda_arn}}"  # Required: ARN of Lambda function for grading model responses
    
 
    epochCount: "{{epochCount}}"
    batchSize: "{{batchSize}}"
    learningRate: "{{learningRate}}"
    maxPromptLength: "{{maxPromptLength}}"
    trainingSamplePerPrompt: "{{trainingSamplePerPrompt}}"
    inferenceMaxTokens: "{{inferenceMaxTokens}}"
    reasoningEffort: "{{reasoningEffort}}"
    evalInterval: "{{evalInterval}}"
  
  rollout:
    enabled: true
  
  trainer:
    peft:
      peft_scheme: lora
